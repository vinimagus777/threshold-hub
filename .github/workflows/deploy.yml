name: Deploy Flet App
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Build Web App
        run: |
          # The 'verbose' flag will show us the actual error if this fails
          flet build web --verbose

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # In 2026, 'flet build web' defaults to a 'build/web' folder
          path: build/web/

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
