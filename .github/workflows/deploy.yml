name: Deploy Flet App
on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Build Web App
        run: |
          # We use the modern 'build web' command instead of 'publish'
          flet build web --output build_web

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          # Flet build web puts the files in our specified output folder
          path: build_web/

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
